name: Manual regeneration

on:
  workflow_dispatch:

jobs:
  handle-location:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml
          
      - name: Rebuild trip.json
        run: |
          python scripts/generate_trip_json.py

      - name: Update post template options
        run: |
          python scripts/update_post_template.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/2026/trip.json .github/ISSUE_TEMPLATE/post.yml
          git commit -m "Manual rebuild" || echo "No changes to commit"
          git push
