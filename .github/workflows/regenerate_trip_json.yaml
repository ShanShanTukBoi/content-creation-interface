name: Regenerate Trip JSON

on:
  workflow_dispatch:

jobs:
  handle-location:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild trip.json
        run: |
          python scripts/generate_trip_json.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/2026/trip.json
          git commit -m "Regenerated trip.json" || echo "No changes to commit"
          git push
